<div class="fixed inset-0 z-50 bg-linear-to-br from-gray-900 via-gray-800 to-black backdrop-blur-sm flex items-center justify-center p-4">
  <div class="bg-white text-black rounded-xl w-full max-w-md shadow-lg p-6 relative">

    <!-- Header -->
    <div class="flex justify-between items-center border-b pb-3 mb-4">
      <h3 class="text-xl font-bold">Admin Login</h3>
    </div>

    <p class="mb-4 text-sm font-semibold text-gray-700">
      Enter admin credentials to access the hotel panel.
    </p>

    <div class="flex flex-col gap-4" (keydown.enter)="handleLogin()">

      <div>
        <input
          type="text"
          placeholder="Username"
          [(ngModel)]="username"
          (input)="errors.username=''; errors.general=''"
          class="px-4 py-2 border rounded w-full"
          [ngClass]="errors.username ? 'border-red-500' : 'border-gray-300'"
        />
        @if (errors.username) {
          <p class="text-xs text-red-500 font-semibold">
            {{ errors.username }}
          </p>
        }
      </div>

      <!-- Password -->
      <div class="relative">
        <input
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Password"
          [(ngModel)]="password"
          (input)="errors.password=''; errors.general=''"
          class="px-4 py-2 border rounded w-full"
          [ngClass]="errors.password ? 'border-red-500' : 'border-gray-300'"
        />

        <!-- Toggle Icon -->
        <button
          type="button"
          class="absolute cursor-pointer right-3 top-2 text-gray-600"
          (click)="showPassword = !showPassword"
        >
          <mat-icon style="font-size: 22px;">
            {{ showPassword ? 'visibility' : 'visibility_off' }}
          </mat-icon>
        </button>
          @if (errors.password) {
            <p class="text-xs text-red-500 font-semibold">
              {{ errors.password }}
            </p>
          }
      </div>

    </div>

    <!-- Error -->
     @if (errors.general) {
       <div
            class="bg-red-500/10 border-l-4 border-red-500 p-4 mt-4 rounded">
         <div class="flex gap-3">
           <mat-icon class="text-red-500">warning</mat-icon>
           <p class="text-sm font-semibold text-red-600">
             {{ errors.general }}
           </p>
         </div>
       </div>
     }

    <!-- Button -->
    <div class="pt-6">
      <button
        (click)="handleLogin()"
        [disabled]="isLoading()"
        class="w-full bg-black text-white py-2 rounded hover:bg-gray-800 transition disabled:opacity-50 cursor-pointer flex items-center justify-center gap-2"
      >
        @if (isLoading()) {<mat-icon class="animate-spin">autorenew</mat-icon>}
        {{ isLoading() ? '' : 'Login' }}
      </button>
    </div>

  </div>
</div>
